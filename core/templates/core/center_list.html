{% extends "core/base.html" %}

{% block content %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
    <h1 class="h2">Examination Centers</h1>
    <div class="btn-toolbar mb-2 mb-md-0">
        <a href="{% url 'center_create' %}" class="btn btn-sm btn-primary">Add Center</a>
    </div>
</div>

<div class="table-responsive">
    <table class="table table-striped">
        <thead>
            <tr>
                <th>Name</th>
                <th>Location</th>
                <th>Capacity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for center in centers %}
            <tr>
                <td>{{ center.name }}</td>
                <td>{{ center.location }}</td>
                <td>{{ center.capacity }}</td>
                <td>
                    <a href="{% url 'center_update' center.pk %}" class="btn btn-sm btn-outline-secondary">Edit</a>
                    <a href="{% url 'center_delete' center.pk %}" class="btn btn-sm btn-outline-danger">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="4" class="text-center">No centers found.</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
